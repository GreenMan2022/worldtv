    <style>
        /* ═══════════════════════════════════════════
           CSS-переменные (дизайн-токены)
        ═══════════════════════════════════════════ */
        :root {
            --bg:            #0B0B0E;
            --bg-elevated:   #131318;
            --bg-card:       #1A1A21;
            --bg-card-hover: #222230;
            --fg:            #EDEDF0;
            --fg-muted:      #7A7A88;
            --fg-dim:        #4A4A56;
            --accent:        #FF375F;
            --accent-glow:   rgba(255, 55, 95, 0.25);
            --accent-soft:   rgba(255, 55, 95, 0.1);
            --accent2:       #FF6B35;
            --green:         #34D399;
            --yellow:        #FBBF24;
            --border:        rgba(255,255,255,0.06);
            --border-light:  rgba(255,255,255,0.1);
            --glass:         rgba(11,11,14,0.82);
            --glass-border:  rgba(255,255,255,0.08);
            --radius-sm:     8px;
            --radius-md:     12px;
            --radius-lg:     16px;
            --radius-xl:     20px;
            --radius-full:   9999px;
            --shadow-card:   0 2px 12px rgba(0,0,0,0.3), 0 0 0 1px var(--border);
            --shadow-elevated: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px var(--border);
            --font-display:  'Space Grotesk', sans-serif;
            --font-body:     'DM Sans', sans-serif;
            --header-h:      60px;
            --cat-h:         52px;
            --subcat-h:      46px;
            --safe-bottom:   env(safe-area-inset-bottom, 0px);
        }

        /* ═══════════════════════════════════════════
           Сброс и базовые стили
        ═══════════════════════════════════════════ */
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        html {
            scroll-behavior: smooth;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* Фоновая атмосфера: два размытых пятна */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(120px);
            opacity: 0.35;
        }
        body::before {
            width: 500px; height: 500px;
            top: -120px; left: -100px;
            background: var(--accent);
            animation: floatBlob 20s ease-in-out infinite alternate;
        }
        body::after {
            width: 400px; height: 400px;
            bottom: -80px; right: -80px;
            background: var(--accent2);
            animation: floatBlob 25s ease-in-out infinite alternate-reverse;
        }

        @keyframes floatBlob {
            0%   { transform: translate(0, 0) scale(1); }
            50%  { transform: translate(60px, 40px) scale(1.15); }
            100% { transform: translate(-30px, 80px) scale(0.95); }
        }

        /* Весь контент поверх фоновых пятен */
        body > * { position: relative; z-index: 1; }

        /* Утилиты */
        .sr-only {
            position: absolute; width:1px; height:1px;
            padding:0; margin:-1px; overflow:hidden;
            clip: rect(0,0,0,0); white-space:nowrap; border:0;
        }

        /* ═══════════════════════════════════════════
           Загрузочный экран
        ═══════════════════════════════════════════ */
        .loader {
            position: fixed; inset:0;
            background: var(--bg);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10000;
            transition: opacity .4s ease, visibility .4s ease;
        }
        .loader.hidden {
            opacity: 0; visibility: hidden; pointer-events: none;
        }
        .loader-logo {
            font-family: var(--font-display);
            font-size: 32px; font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 28px;
            display: flex; align-items: center; gap: 10px;
        }
        .loader-logo .dot {
            width: 10px; height: 10px;
            background: var(--accent);
            border-radius: 50%;
            display: inline-block;
            animation: loaderPulse 1.2s ease-in-out infinite;
        }
        .loader-logo .dot:nth-child(2) { animation-delay: .15s; }
        .loader-logo .dot:nth-child(3) { animation-delay: .3s; }

        @keyframes loaderPulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        .loader-bar {
            width: 160px; height: 3px;
            background: var(--border-light);
            border-radius: 3px;
            overflow: hidden;
        }
        .loader-bar::after {
            content: '';
            display: block;
            width: 40%; height: 100%;
            background: var(--accent);
            border-radius: 3px;
            animation: loaderSlide 1s ease-in-out infinite;
        }
        @keyframes loaderSlide {
            0%   { transform: translateX(-100%); }
            100% { transform: translateX(400%); }
        }

        /* ═══════════════════════════════════════════
           Шапка
        ═══════════════════════════════════════════ */
        .app-header {
            position: sticky; top:0; z-index: 200;
            height: var(--header-h);
            background: var(--glass);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border-bottom: 1px solid var(--glass-border);
            display: flex; align-items: center;
            padding: 0 16px; gap: 12px;
        }

        .header-logo {
            font-family: var(--font-display);
            font-size: 20px; font-weight: 700;
            letter-spacing: -0.5px;
            white-space: nowrap;
            color: var(--fg);
            text-decoration: none;
            flex-shrink: 0;
            display: flex; align-items: center; gap: 6px;
        }
        .header-logo .accent { color: var(--accent); }

        /* Поиск */
        .search-wrap {
            flex: 1; max-width: 420px;
            position: relative;
        }
        .search-wrap i {
            position: absolute; left: 12px; top: 50%;
            transform: translateY(-50%);
            color: var(--fg-dim); font-size: 14px;
            pointer-events: none;
            transition: color .2s;
        }
        .search-input {
            width: 100%; height: 38px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            padding: 0 14px 0 36px;
            font-family: var(--font-body);
            font-size: 14px; color: var(--fg);
            outline: none;
            transition: all .2s ease;
        }
        .search-input::placeholder { color: var(--fg-dim); }
        .search-input:focus {
            border-color: var(--accent);
            background: rgba(255,55,95,0.06);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .search-input:focus + i,
        .search-input:focus ~ i { color: var(--accent); }

        /* Кнопки шапки */
        .header-actions {
            display: flex; align-items: center; gap: 4px;
            flex-shrink: 0;
        }
        .header-btn {
            width: 38px; height: 38px;
            border-radius: var(--radius-full);
            border: none;
            background: transparent;
            color: var(--fg-muted);
            font-size: 16px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all .2s ease;
            position: relative;
        }
        .header-btn:hover {
            background: rgba(255,255,255,0.08);
            color: var(--fg);
        }
        .header-btn:active { transform: scale(0.92); }
        .header-btn.active-toggle {
            color: var(--accent);
            background: var(--accent-soft);
        }
        .header-btn .badge {
            position: absolute; top: 4px; right: 4px;
            width: 8px; height: 8px;
            background: var(--accent);
            border-radius: 50%;
            border: 2px solid var(--bg-elevated);
        }

        /* Языковая кнопка */
        .lang-btn {
            font-family: var(--font-display);
            font-size: 12px; font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            padding: 0 10px;
            width: auto;
        }

        /* ═══════════════════════════════════════════
           Панель основных категорий
        ═══════════════════════════════════════════ */
        .main-categories-panel {
            position: sticky;
            top: var(--header-h);
            height: var(--cat-h);
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center;
            padding: 0 12px; gap: 6px;
            overflow-x: auto; overflow-y: hidden;
            white-space: nowrap;
            scrollbar-width: none;
            z-index: 150;
        }
        .main-categories-panel::-webkit-scrollbar { display: none; }

        .category-btn {
            background: transparent;
            border: 1px solid transparent;
            padding: 8px 16px;
            border-radius: var(--radius-full);
            color: var(--fg-muted);
            font-family: var(--font-body);
            font-size: 13px; font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all .2s ease;
            display: flex; align-items: center; gap: 7px;
            flex-shrink: 0;
        }
        .category-btn i { font-size: 14px; opacity: 0.7; }
        .category-btn:hover {
            color: var(--fg);
            background: rgba(255,255,255,0.06);
        }
        .category-btn.active {
            color: #fff;
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 2px 12px var(--accent-glow);
        }
        .category-btn.active i { opacity: 1; }

        /* ═══════════════════════════════════════════
           Панель подкатегорий
        ═══════════════════════════════════════════ */
        .sub-categories-panel {
            position: sticky;
            top: calc(var(--header-h) + var(--cat-h));
            height: var(--subcat-h);
            background: rgba(11,11,14,0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center;
            padding: 0 12px; gap: 6px;
            overflow-x: auto; overflow-y: hidden;
            white-space: nowrap;
            scrollbar-width: none;
            z-index: 140;
            transition: opacity .2s, transform .2s;
        }
        .sub-categories-panel::-webkit-scrollbar { display: none; }
        .sub-categories-panel.collapsed {
            opacity: 0; height: 0; pointer-events: none;
            overflow: hidden;
        }

        .subcategory-btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: var(--radius-full);
            color: var(--fg-muted);
            font-family: var(--font-body);
            font-size: 12px; font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all .2s ease;
            flex-shrink: 0;
        }
        .subcategory-btn:hover {
            color: var(--fg);
            border-color: var(--border-light);
            background: rgba(255,255,255,0.08);
        }
        .subcategory-btn.active {
            color: #fff;
            background: rgba(255,55,95,0.15);
            border-color: rgba(255,55,95,0.4);
        }

        /* ═══════════════════════════════════════════
           Информационная строка (счётчик каналов)
        ═══════════════════════════════════════════ */
        .channels-info {
            padding: 16px 20px 0;
            max-width: 1440px;
            margin: 0 auto;
            width: 100%;
            display: flex; align-items: center; justify-content: space-between;
        }
        .channels-count {
            font-size: 13px; color: var(--fg-dim);
            font-weight: 500;
        }
        .channels-count span {
            color: var(--fg-muted);
            font-weight: 600;
        }

        /* ═══════════════════════════════════════════
           Скелетонная загрузка
        ═══════════════════════════════════════════ */
        .skeleton-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
            padding: 16px 20px;
            max-width: 1440px;
            margin: 0 auto;
        }
        .skeleton-card {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .skeleton-thumb {
            width: 100%; height: 150px;
            background: linear-gradient(110deg, var(--bg-card) 30%, rgba(255,255,255,0.04) 50%, var(--bg-card) 70%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease-in-out infinite;
        }
        .skeleton-body { padding: 12px; }
        .skeleton-line {
            height: 14px; border-radius: 6px;
            background: linear-gradient(110deg, var(--bg-card) 30%, rgba(255,255,255,0.04) 50%, var(--bg-card) 70%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease-in-out infinite;
            margin-bottom: 8px;
        }
        .skeleton-line:last-child { margin-bottom: 0; width: 60%; }
        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ═══════════════════════════════════════════
           Сетка каналов
        ═══════════════════════════════════════════ */
        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
            padding: 16px 20px;
            padding-bottom: calc(16px + var(--safe-bottom));
            max-width: 1440px;
            margin: 0 auto;
            width: 100%;
        }

        /* ═══════════════════════════════════════════
           Карточка канала
        ═══════════════════════════════════════════ */
        .channel-card {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            overflow: hidden;
            cursor: pointer;
            transition: all .25s ease;
            border: 1px solid var(--border);
            outline: none;
        }
        .channel-card:hover {
            transform: translateY(-4px);
            background: var(--bg-card-hover);
            box-shadow: var(--shadow-elevated);
            border-color: var(--border-light);
        }
        .channel-card:focus-visible {
            box-shadow: 0 0 0 3px var(--accent-glow), var(--shadow-elevated);
            border-color: var(--accent);
        }
        .channel-card:active { transform: translateY(-1px) scale(0.99); }

        /* Мини-превью */
        .channel-media {
            position: relative;
            width: 100%;
            aspect-ratio: 16/10;
            background: #000;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .channel-media img {
            max-width: 75%; max-height: 75%;
            object-fit: contain;
            transition: transform .3s ease;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
        }
        .channel-card:hover .channel-media img {
            transform: scale(1.08);
        }
        .channel-media .fallback-icon {
            font-size: 36px;
            color: var(--fg-dim);
        }

        /* Индикатор прямого эфира */
        .live-badge {
            position: absolute; top: 8px; left: 8px;
            background: var(--accent);
            color: #fff;
            font-size: 10px; font-weight: 700;
            letter-spacing: 0.5px;
            padding: 2px 8px;
            border-radius: var(--radius-full);
            display: flex; align-items: center; gap: 4px;
            text-transform: uppercase;
        }
        .live-badge::before {
            content: '';
            width: 6px; height: 6px;
            background: #fff;
            border-radius: 50%;
            animation: livePulse 1.5s ease-in-out infinite;
        }
        @keyframes livePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Индикатор зрителей */
        .viewers-badge {
            position: absolute; top: 8px; right: 8px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            color: var(--fg-muted);
            font-size: 11px; font-weight: 500;
            padding: 2px 8px;
            border-radius: var(--radius-full);
            display: flex; align-items: center; gap: 4px;
        }
        .viewers-badge i { font-size: 10px; color: var(--green); }

        /* Мини-плеер */
        .mini-player {
            position: absolute; inset: 0;
            display: none;
            background: #000;
        }
        .mini-player video {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        /* Информация канала */
        .channel-info {
            padding: 10px 12px 12px;
        }
        .channel-info h3 {
            font-family: var(--font-display);
            font-size: 14px; font-weight: 600;
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        .channel-meta {
            display: flex; align-items: center; gap: 8px;
            font-size: 11px; color: var(--fg-dim);
        }
        .channel-meta .tag {
            background: rgba(255,255,255,0.06);
            padding: 2px 7px;
            border-radius: var(--radius-sm);
            color: var(--fg-muted);
            font-weight: 500;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Статус «недоступен» */
        .channel-card.offline {
            opacity: 0.5;
            pointer-events: none;
        }
        .channel-card.offline .channel-media::after {
            content: '';
            position: absolute; inset: 0;
            background: repeating-linear-gradient(
                45deg, transparent, transparent 8px,
                rgba(255,255,255,0.015) 8px, rgba(255,255,255,0.015) 16px
            );
        }

        /* ═══════════════════════════════════════════
           Пустое состояние
        ═══════════════════════════════════════════ */
        .empty-state {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            text-align: center;
            max-width: 400px;
            margin: 0 auto;
        }
        .empty-state.visible { display: flex; }
        .empty-icon {
            width: 80px; height: 80px;
            background: var(--accent-soft);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px;
            margin-bottom: 20px;
            color: var(--accent);
        }
        .empty-state h3 {
            font-family: var(--font-display);
            font-size: 18px; font-weight: 600;
            margin-bottom: 8px;
        }
        .empty-state p {
            font-size: 14px; color: var(--fg-muted);
            line-height: 1.6;
        }

        /* ═══════════════════════════════════════════
           Модальное окно плеера
        ═══════════════════════════════════════════ */
        .modal {
            display: none;
            position: fixed; inset: 0;
            background: #000;
            z-index: 1000;
        }
        .modal-content {
            position: relative;
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-content video {
            width: 100%; height: 100%;
            object-fit: contain;
            background: #000;
        }

        /* Информационный оверлей плеера */
        .player-overlay {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 16px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent);
            display: flex; align-items: flex-start; justify-content: space-between;
            pointer-events: none;
            z-index: 10;
            opacity: 1;
            transition: opacity .3s ease;
        }
        .player-overlay.hidden { opacity: 0; }
        .player-channel-name {
            font-family: var(--font-display);
            font-size: 18px; font-weight: 600;
            color: #fff;
            text-shadow: 0 1px 6px rgba(0,0,0,0.5);
            max-width: 70%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .player-channel-group {
            font-size: 12px; color: rgba(255,255,255,0.6);
            margin-top: 2px;
        }

        .close-btn {
            pointer-events: auto;
            width: 42px; height: 42px;

    <script>
        // Автоскрытие скелетона при появлении каналов
        (function() {
            var skel = document.getElementById('skeletonGrid');
            var grid = document.getElementById('channelsContainer');
            if (!skel || !grid) return;

            var observer = new MutationObserver(function() {
                if (grid.children.length > 0) {
                    skel.style.display = 'none';
                    observer.disconnect();
                }
            });
            observer.observe(grid, { childList: true });

            // Фолбэк: скрыть через 15 сек в любом случае
            setTimeout(function() {
                skel.style.display = 'none';
                observer.disconnect();
            }, 15000);
        })();

        // Автогенерация скелетонных карточек
        (function() {
            var skel = document.getElementById('skeletonGrid');
            if (!skel) return;
            var count = Math.max(4, Math.min(12, Math.floor(window.innerWidth / 280) * 2));
            var html = '';
            for (var i = 0; i < count; i++) {
                html += '<div class="skeleton-card">'
                    + '<div class="skeleton-thumb"></div>'
                    + '<div class="skeleton-body">'
                    + '<div class="skeleton-line"></div>'
                    + '<div class="skeleton-line"></div>'
                    + '</div></div>';
            }
            skel.innerHTML = html;
        })();
